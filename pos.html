<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PaanRaja — POS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g1:#1a4a1a;--g2:#2d7a2d;--g3:#3ea83e;--g4:#c5e8c5;
  --gold:#c9a84c;--gold2:#f0d080;--gold3:#fffdf0;
  --text:#111827;--muted:#6b7280;--bg:#f2f7f2;--card:#fff;
  --red:#dc2626;--redbg:#fee2e2;
  --sh:0 2px 12px rgba(26,74,26,.1);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{background:var(--g1);height:54px;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;
  background-image:linear-gradient(135deg,var(--g1) 0%,#1f5c1f 100%)}
.tb-logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:#fff;display:flex;align-items:center;gap:8px}
.tb-logo span{background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tb-sep{width:1px;height:24px;background:rgba(255,255,255,.2);margin:0 4px}
.tb-time{color:rgba(255,255,255,.75);font-size:13px;font-weight:500}
.tb-staff{display:flex;align-items:center;gap:8px;margin-left:auto;background:rgba(255,255,255,.12);border-radius:20px;padding:5px 12px 5px 6px;cursor:pointer;transition:background .15s}
.tb-staff:hover{background:rgba(255,255,255,.2)}
.tb-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--g1)}
.tb-name{color:#fff;font-size:12px;font-weight:600}
.tb-btn{background:rgba(255,255,255,.12);border:none;border-radius:8px;color:#fff;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;font-family:'Inter',sans-serif;white-space:nowrap}
.tb-btn:hover{background:rgba(255,255,255,.22)}
.tb-btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--g1)}
.tb-btn.gold:hover{box-shadow:0 0 0 3px rgba(201,168,76,.3)}

/* ── MAIN LAYOUT ── */
.main{flex:1;display:grid;grid-template-columns:1fr 380px;overflow:hidden}

/* ── LEFT: MENU ── */
.menu-panel{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid #e5e7eb}
.search-bar{padding:12px 14px;background:#fff;border-bottom:1px solid #e8f0e8}
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid #d1e7d1;border-radius:10px;padding:8px 12px;transition:border-color .15s}
.search-wrap:focus-within{border-color:var(--g2);box-shadow:0 0 0 3px rgba(45,122,45,.1)}
.search-wrap input{border:none;background:transparent;flex:1;font-size:13px;outline:none;color:var(--text);font-family:'Inter',sans-serif}
.cats{display:flex;gap:6px;padding:10px 14px;background:#fff;border-bottom:1px solid #e8f0e8;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.cats::-webkit-scrollbar{display:none}
.cat-chip{white-space:nowrap;border:1.5px solid #d1e7d1;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);background:#fff;transition:all .13s;user-select:none}
.cat-chip.on{background:var(--g1);color:#fff;border-color:var(--g1)}
.items-grid{flex:1;overflow-y:auto;padding:12px 14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;align-content:start}
.items-grid::-webkit-scrollbar{width:4px}
.items-grid::-webkit-scrollbar-thumb{background:#c5e8c5;border-radius:2px}
.item-card{background:var(--card);border-radius:14px;padding:14px;cursor:pointer;border:2px solid transparent;transition:all .15s;box-shadow:var(--sh);user-select:none;position:relative}
.item-card:hover{border-color:var(--g3);transform:translateY(-2px);box-shadow:0 6px 20px rgba(26,74,26,.15)}
.item-card:active{transform:translateY(0) scale(.97)}
.item-card .pop{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--g1);font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;letter-spacing:.4px}
.item-emoji{font-size:28px;margin-bottom:8px;display:block}
.item-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.3}
.item-desc{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.4}
.item-price{font-size:16px;font-weight:800;color:var(--g2)}
.item-cat{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.4px}
.item-card.in-cart{border-color:var(--g2);background:linear-gradient(135deg,#fff 80%,#f0f9f0)}
.in-cart-badge{position:absolute;bottom:10px;right:10px;background:var(--g2);color:#fff;border-radius:50%;width:20px;height:20px;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center}

/* ── RIGHT: CART ── */
.cart-panel{display:flex;flex-direction:column;background:#fff;overflow:hidden}
.cart-top{padding:14px 16px 10px;border-bottom:1px solid #f0f0f0}
.cart-top h3{font-size:14px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:6px}
.cart-top h3 span.cnt{background:var(--g2);color:#fff;border-radius:20px;font-size:11px;padding:2px 8px}
.cust-row{display:flex;gap:8px;margin-top:10px}
.cust-row input{flex:1;border:1.5px solid #e5e7eb;border-radius:8px;padding:7px 10px;font-size:12px;outline:none;font-family:'Inter',sans-serif;color:var(--text);transition:border-color .15s}
.cust-row input:focus{border-color:var(--g2)}
.cart-items{flex:1;overflow-y:auto;padding:10px 16px}
.cart-items::-webkit-scrollbar{width:3px}
.cart-items::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:2px}
.cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:10px;padding:24px}
.cart-empty .icon{font-size:48px;opacity:.5}
.cart-empty p{font-size:13px;text-align:center;line-height:1.6}
.ci{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f9fafb}
.ci:last-child{border-bottom:none}
.ci-emoji{font-size:20px;flex-shrink:0}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-price{font-size:11px;color:var(--muted)}
.ci-ctrl{display:flex;align-items:center;gap:5px}
.cib{width:25px;height:25px;border-radius:50%;border:1.5px solid #e5e7eb;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--text);transition:all .1s;user-select:none}
.cib:hover{background:var(--g1);color:#fff;border-color:var(--g1)}
.cib:active{transform:scale(.88)}
.cib.rm{border-color:#fecaca;color:var(--red)}
.cib.rm:hover{background:var(--red);border-color:var(--red);color:#fff}
.ci-qty{font-size:13px;font-weight:800;min-width:20px;text-align:center}
.ci-total{font-size:13px;font-weight:800;color:var(--g2);min-width:44px;text-align:right}

/* ── BILL SUMMARY ── */
.bill-area{padding:12px 16px;border-top:1px solid #f0f0f0;background:var(--gold3);flex-shrink:0}
.bill-row{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px;color:var(--muted)}
.bill-total{display:flex;justify-content:space-between;align-items:center;margin:8px 0;padding:10px 14px;background:var(--g1);border-radius:10px}
.bill-total .lbl{color:rgba(255,255,255,.8);font-size:13px;font-weight:600}
.bill-total .amt{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.5px}
.pay-opts{display:flex;gap:6px;margin-bottom:10px}
.popt{flex:1;padding:8px 4px;border:2px solid #e5e7eb;border-radius:9px;background:#fff;cursor:pointer;font-size:12px;font-weight:700;text-align:center;color:var(--muted);transition:all .13s;user-select:none}
.popt.on{border-color:var(--g2);background:var(--g2);color:#fff}
.charge-btn{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--g1);border:none;font-size:15px;font-weight:800;cursor:pointer;transition:all .15s;letter-spacing:.2px;font-family:'Inter',sans-serif}
.charge-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,168,76,.45)}
.charge-btn:active{transform:translateY(0)}
.charge-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.wa-btn{width:100%;padding:10px;border-radius:10px;background:#25d366;color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;margin-top:7px;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s;font-family:'Inter',sans-serif}
.wa-btn:hover{background:#1fb956;transform:translateY(-1px)}
.wa-btn svg{width:18px;height:18px;fill:currentColor}
.clear-btn{width:100%;padding:9px;border-radius:9px;background:#f9fafb;color:var(--muted);border:1px solid #e5e7eb;font-size:12px;font-weight:600;cursor:pointer;margin-top:5px;font-family:'Inter',sans-serif;transition:all .12s}
.clear-btn:hover{color:var(--red);border-color:var(--red);background:var(--redbg)}

/* ── TOAST ── */
#toast{position:fixed;top:70px;right:20px;background:var(--g1);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .22s;transform:translateY(-8px);pointer-events:none;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.25)}
#toast.show{opacity:1;transform:translateY(0)}

/* ── RECEIPT MODAL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.ov.open{display:flex}
.receipt{background:#fff;border-radius:20px;padding:28px;max-width:380px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:pop .2s cubic-bezier(.34,1.4,.7,1)}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:none;opacity:1}}
.r-header{text-align:center;margin-bottom:20px}
.r-logo{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:var(--g1)}
.r-addr{font-size:11px;color:var(--muted);margin-top:3px}
.r-divider{border:none;border-top:1px dashed #d1d5db;margin:12px 0}
.r-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:14px}
.r-item{display:flex;align-items:center;gap:6px;font-size:13px;padding:5px 0;border-bottom:1px solid #f3f4f6}
.r-item:last-child{border:none}
.r-item .rn{flex:1;font-weight:600}
.r-item .rq{color:var(--muted);min-width:30px;text-align:center}
.r-item .rp{font-weight:700;color:var(--g2)}
.r-total-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin:4px 0}
.r-grand{display:flex;justify-content:space-between;align-items:center;background:var(--g1);color:#fff;border-radius:10px;padding:10px 14px;margin:10px 0}
.r-grand .lg{font-size:13px;opacity:.8}
.r-grand .lv{font-size:20px;font-weight:800}
.r-footer{text-align:center;font-size:11px;color:var(--muted);margin-top:12px;line-height:1.7}
.r-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.r-actions button{padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .12s;font-family:'Inter',sans-serif}
.r-act-new{background:var(--g1);color:#fff}
.r-act-wa{background:#25d366;color:#fff}

/* ── ONLINE ORDERS DRAWER ── */
.oo-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none}
.oo-ov.open{display:block}
.oo-drawer{position:fixed;right:0;top:0;bottom:0;width:360px;background:#fff;box-shadow:-8px 0 40px rgba(0,0,0,.2);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.oo-ov.open .oo-drawer{transform:translateX(0)}
.oo-head{background:var(--g1);padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.oo-head h3{color:#fff;font-size:16px;font-weight:800}
.oo-close{background:rgba(255,255,255,.15);border:none;border-radius:8px;color:#fff;width:32px;height:32px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.oo-list{flex:1;overflow-y:auto;padding:14px}
.oo-card{border:1.5px solid #e5e7eb;border-radius:12px;padding:14px;margin-bottom:10px;transition:all .15s}
.oo-card:hover{border-color:var(--g3)}
.oo-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.oo-id{font-size:12px;font-weight:700;color:var(--g2)}
.oo-time{font-size:11px;color:var(--muted);margin-left:auto}
.oo-name{font-size:14px;font-weight:700}
.oo-ph{font-size:12px;color:var(--muted)}
.oo-items{font-size:12px;color:var(--muted);margin:6px 0;line-height:1.5}
.oo-foot{display:flex;align-items:center;justify-content:space-between}
.oo-amt{font-size:16px;font-weight:800;color:var(--g2)}
.oo-accept{background:var(--g2);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .12s}
.oo-accept:hover{background:var(--g1)}
.oo-badge{display:inline-block;background:#fee2e2;color:#dc2626;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700}
.oo-badge.done{background:#dcfce7;color:#166534}

@media(max-width:768px){
  .main{grid-template-columns:1fr}
  .cart-panel{display:none}
  body{overflow:auto}
}
</style>
</head>
<body>
<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-logo">🍃 <span>PaanRaja</span></div>
  <div class="tb-sep"></div>
  <div class="tb-time" id="tbTime"></div>
  <button class="tb-btn" onclick="openOO()" style="position:relative" id="ooBtn">
    📦 Online Orders <span id="ooBadge" style="display:none;background:#ef4444;color:#fff;border-radius:50%;font-size:10px;padding:1px 5px;margin-left:4px">0</span>
  </button>
  <button class="tb-btn gold" onclick="window.location='dashboard.html'">📊 Dashboard</button>
  <div class="tb-staff" onclick="logout()">
    <div class="tb-av" id="tbAv">??</div>
    <span class="tb-name" id="tbName">Staff</span>
    <span style="color:rgba(255,255,255,.5);margin-left:4px;font-size:11px">↩</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- LEFT: MENU -->
  <div class="menu-panel">
    <div class="search-bar">
      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="searchQ" placeholder="Search paan, items…" oninput="filterMenu(this.value)">
      </div>
    </div>
    <div class="cats" id="catRow">
      <span class="cat-chip on" onclick="filterCat(this,'All')">All Items</span>
    </div>
    <div class="items-grid" id="itemsGrid"></div>
  </div>

  <!-- RIGHT: CART -->
  <div class="cart-panel">
    <div class="cart-top">
      <h3>🛒 Current Bill <span class="cnt" id="cartCnt">0</span></h3>
      <div class="cust-row">
        <input id="custName" placeholder="Customer name (optional)" maxlength="40">
        <input id="custPhone" placeholder="Phone" maxlength="10" type="tel">
      </div>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="bill-area" id="billArea">
      <div class="bill-row"><span>Subtotal</span><span id="bSub">₹0</span></div>
      <div class="bill-row"><span>GST (5%)</span><span id="bGst">₹0</span></div>
      <div class="bill-row" style="color:var(--gold);font-weight:600" id="discRow" style="display:none">
        <span>Discount</span><span id="bDisc">−₹0</span>
      </div>
      <div class="bill-total">
        <span class="lbl">TOTAL</span>
        <span class="amt" id="bTotal">₹0</span>
      </div>
      <div class="pay-opts">
        <span class="popt on" onclick="selPay(this,'Cash')">💵 Cash</span>
        <span class="popt" onclick="selPay(this,'UPI')">📱 UPI</span>
        <span class="popt" onclick="selPay(this,'Card')">💳 Card</span>
      </div>
      <button class="charge-btn" id="chargeBtn" onclick="charge()">⚡ Charge <span id="chargeLbl">₹0</span></button>
      <button class="wa-btn" id="waBtn" onclick="sendWA()">

        Send to WhatsApp
      </button>
      <button class="clear-btn" onclick="clearCart()">🗑 Clear Cart</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- RECEIPT MODAL -->
<div class="ov" id="receiptOv" onclick="if(event.target===this)closeReceipt()">
  <div class="receipt" id="receiptCard"></div>
</div>

<!-- ONLINE ORDERS DRAWER -->
<div class="oo-ov" id="ooOv" onclick="if(event.target===this)closeOO()">
  <div class="oo-drawer">
    <div class="oo-head">
      <h3>📦 Online Orders</h3>
      <button class="oo-close" onclick="closeOO()">×</button>
    </div>
    <div class="oo-list" id="ooList"></div>
  </div>
</div>

<script src="shared.js"></script>
<script>
// ── AUTH ──────────────────────────────────
var sess = requireAuth();
if(sess){
  document.getElementById('tbAv').textContent = sess.avatar;
  document.getElementById('tbName').textContent = sess.name.split(' ')[0];
}
function logout(){ clearSession(); window.location='login.html'; }

// ── CLOCK ─────────────────────────────────
function tick(){
  var now=new Date();
  document.getElementById('tbTime').textContent =
    now.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'}) + ' · ' +
    now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}
tick(); setInterval(tick,1000);

// ── STATE ─────────────────────────────────
var cart=[], payMode='Cash', allItems=getAllItems();

// ── BUILD MENU ─────────────────────────────
var catRow=document.getElementById('catRow');
Object.keys(MENU).forEach(function(cat){
  var c=document.createElement('span');
  c.className='cat-chip'; c.textContent=cat;
  c.onclick=function(){ filterCat(c,cat); };
  catRow.appendChild(c);
});
renderGrid(allItems);

function filterCat(el,cat){
  document.querySelectorAll('.cat-chip').forEach(function(c){c.classList.remove('on')});
  el.classList.add('on');
  document.getElementById('searchQ').value='';
  renderGrid(cat==='All'?allItems:allItems.filter(function(i){return i.category===cat}));
}

var _dt;
function filterMenu(q){
  document.querySelectorAll('.cat-chip').forEach(function(c){c.classList.remove('on')});
  document.querySelector('.cat-chip').classList.add('on');
  clearTimeout(_dt);
  _dt=setTimeout(function(){
    renderGrid(q?allItems.filter(function(i){return i.name.toLowerCase().indexOf(q.toLowerCase())>=0||i.desc.toLowerCase().indexOf(q.toLowerCase())>=0}):allItems);
  },160);
}

function renderGrid(items){
  var g=document.getElementById('itemsGrid');
  var cartSkus=cart.map(function(c){return c.id});
  g.innerHTML=items.map(function(it){
    var inCart=cartSkus.indexOf(it.id)>=0;
    var qty=inCart?cart.find(function(c){return c.id===it.id}).qty:0;
    return '<div class="item-card'+(inCart?' in-cart':'')+'" onclick="addItem(\''+it.id+'\')" id="ic_'+it.id+'">'+
      (it.popular?'<span class="pop">★ HOT</span>':'')+
      '<span class="item-emoji">'+it.emoji+'</span>'+
      '<div class="item-name">'+it.name+'</div>'+
      '<div class="item-desc">'+it.desc+'</div>'+
      '<div class="item-price">₹'+it.price+'</div>'+
      '<div class="item-cat">'+it.category+'</div>'+
      (inCart?'<div class="in-cart-badge">'+qty+'</div>':'')+
      '</div>';
  }).join('')||'<div style="padding:24px;color:var(--muted);font-size:13px;grid-column:1/-1">No items found</div>';
}

// ── CART LOGIC ─────────────────────────────
function addItem(id){
  var item=allItems.find(function(i){return i.id===id});
  if(!item) return;
  var ex=cart.find(function(c){return c.id===id});
  if(ex){ ex.qty++; } else { cart.push({id:item.id,name:item.name,price:item.price,emoji:item.emoji,qty:1,category:item.category}); }
  if(navigator.vibrate) navigator.vibrate(20);
  renderCart(); renderGrid(document.querySelector('.cat-chip.on').textContent==='All Items'?allItems:allItems.filter(function(i){return i.category===document.querySelector('.cat-chip.on').textContent}));
  toast('➕ '+item.name+' added');
}

function chgQty(id,d){
  var i=cart.findIndex(function(c){return c.id===id});
  if(i<0) return;
  cart[i].qty+=d;
  if(cart[i].qty<=0) cart.splice(i,1);
  renderCart();
  // re-render just the card
  var q=document.getElementById('searchQ').value;
  var cat=document.querySelector('.cat-chip.on').textContent;
  var vis=q?allItems.filter(function(i){return i.name.toLowerCase().indexOf(q.toLowerCase())>=0}):
           (cat==='All Items'?allItems:allItems.filter(function(i){return i.category===cat}));
  renderGrid(vis);
}

function clearCart(){ cart=[]; renderCart(); renderGrid(allItems); document.querySelector('.cat-chip').click(); }

function renderCart(){
  var el=document.getElementById('cartItems');
  var cnt=cart.reduce(function(s,c){return s+c.qty},0);
  document.getElementById('cartCnt').textContent=cnt;
  if(!cart.length){
    el.innerHTML='<div class="cart-empty"><div class="icon">🍃</div><p>Cart is empty<br>Tap any item to add it</p></div>';
    document.getElementById('billArea').style.opacity='.5';
    document.getElementById('chargeBtn').disabled=true;
    document.getElementById('waBtn').style.opacity='.5';
    document.getElementById('waBtn').style.pointerEvents='none';
    document.getElementById('bSub').textContent='₹0';
    document.getElementById('bGst').textContent='₹0';
    document.getElementById('bTotal').textContent='₹0';
    document.getElementById('chargeLbl').textContent='₹0';
    return;
  }
  document.getElementById('billArea').style.opacity='1';
  document.getElementById('chargeBtn').disabled=false;
  document.getElementById('waBtn').style.opacity='1';
  document.getElementById('waBtn').style.pointerEvents='auto';

  el.innerHTML=cart.map(function(c){
    return '<div class="ci">'+
      '<span class="ci-emoji">'+c.emoji+'</span>'+
      '<div class="ci-info"><div class="ci-name">'+c.name+'</div><div class="ci-price">₹'+c.price+' each</div></div>'+
      '<div class="ci-ctrl">'+
      '<button class="cib rm" onclick="chgQty(\''+c.id+'\', -1)">−</button>'+
      '<span class="ci-qty">'+c.qty+'</span>'+
      '<button class="cib" onclick="chgQty(\''+c.id+'\', 1)">+</button>'+
      '</div>'+
      '<div class="ci-total">₹'+(c.price*c.qty)+'</div></div>';
  }).join('');

  var sub=cart.reduce(function(s,c){return s+c.price*c.qty},0);
  var gst=Math.round(sub*0.05);
  var total=sub+gst;
  document.getElementById('bSub').textContent='₹'+sub;
  document.getElementById('bGst').textContent='₹'+gst;
  document.getElementById('bTotal').textContent='₹'+total;
  document.getElementById('chargeLbl').textContent='₹'+total;
}

function selPay(el,m){
  document.querySelectorAll('.popt').forEach(function(b){b.classList.remove('on')});
  el.classList.add('on'); payMode=m;
}

// ── CHECKOUT ──────────────────────────────
function charge(){
  if(!cart.length) return;
  var sub=cart.reduce(function(s,c){return s+c.price*c.qty},0);
  var gst=Math.round(sub*0.05);
  var order={items:JSON.parse(JSON.stringify(cart)),subtotal:sub,gst:gst,total:sub+gst,
    payment:payMode,staff:sess?sess.name:'Staff',
    customer:document.getElementById('custName').value||'Walk-in',
    phone:document.getElementById('custPhone').value||''};
  var inv=saveOrder(order);
  order.id=inv;
  showReceipt(order);
}

function showReceipt(order){
  var itemRows=order.items.map(function(i){
    return '<div class="r-item"><span class="rn">'+i.emoji+' '+i.name+'</span><span class="rq">×'+i.qty+'</span><span class="rp">₹'+(i.price*i.qty)+'</span></div>';
  }).join('');
  document.getElementById('receiptCard').innerHTML=
    '<div class="r-header">'+
    '<div class="r-logo">🍃 PaanRaja</div>'+
    '<div class="r-addr">Premium Pan Shop · GST: 24ABCDE1234F1Z5</div>'+
    '</div>'+
    '<hr class="r-divider">'+
    '<div class="r-meta"><span>#'+order.id+'</span><span>'+order.date+' '+order.time+'</span></div>'+
    '<div class="r-meta"><span>Customer: '+order.customer+'</span><span>Staff: '+order.staff+'</span></div>'+
    '<hr class="r-divider">'+
    itemRows+
    '<hr class="r-divider">'+
    '<div class="r-total-row"><span>Subtotal</span><span>₹'+order.subtotal+'</span></div>'+
    '<div class="r-total-row"><span>GST (5%)</span><span>₹'+order.gst+'</span></div>'+
    '<div class="r-grand"><span class="lg">TOTAL · '+order.payment+'</span><span class="lv">₹'+order.total+'</span></div>'+
    '<div class="r-footer">🍃 Thank you for visiting PaanRaja!<br>Come again · paanraja.in · +91 98765 43210</div>'+
    '<div class="r-actions">'+
    '<button class="r-act-new" onclick="newBill()">🧾 New Bill</button>'+
    '<button class="r-act-wa" onclick="sendWAReceipt('+JSON.stringify(order).replace(/</g,'&lt;').replace(/>/g,'&gt;')+')" >📱 WhatsApp</button>'+
    '</div>';
  document.getElementById('receiptOv').classList.add('open');
}

function closeReceipt(){ document.getElementById('receiptOv').classList.remove('open'); }
function newBill(){
  closeReceipt();
  cart=[];
  document.getElementById('custName').value='';
  document.getElementById('custPhone').value='';
  renderCart(); renderGrid(allItems);
  document.querySelector('.cat-chip').classList.add('on');
  toast('✅ New bill started');
}

// ── WHATSAPP ──────────────────────────────
function sendWA(){
  if(!cart.length){ toast('Add items first'); return; }
  var sub=cart.reduce(function(s,c){return s+c.price*c.qty},0);
  var gst=Math.round(sub*0.05);
  var lines=['🍃 *PaanRaja Order*',''];
  cart.forEach(function(c){ lines.push('• '+c.name+' ×'+c.qty+' = ₹'+(c.price*c.qty)); });
  lines.push('','Subtotal: ₹'+sub,'GST (5%): ₹'+gst,'*Total: ₹'+(sub+gst)+'*','','Payment: '+payMode,'Customer: '+(document.getElementById('custName').value||'Walk-in'));
  var msg=encodeURIComponent(lines.join('\n'));
  window.open('https://wa.me/?text='+msg,'_blank');
}

function sendWAReceipt(order){
  var lines=['🍃 *PaanRaja Receipt*','Invoice: #'+order.id,''];
  order.items.forEach(function(i){ lines.push('• '+i.name+' ×'+i.qty+' = ₹'+(i.price*i.qty)); });
  lines.push('','Subtotal: ₹'+order.subtotal,'GST: ₹'+order.gst,'*TOTAL: ₹'+order.total+'*','Payment: '+order.payment,'','Thank you! 🙏');
  window.open('https://wa.me/?text='+encodeURIComponent(lines.join('\n')),'_blank');
}

// ── ONLINE ORDERS ─────────────────────────
function openOO(){
  renderOO();
  document.getElementById('ooOv').classList.add('open');
}
function closeOO(){ document.getElementById('ooOv').classList.remove('open'); }

function renderOO(){
  var orders=getOnlineOrders();
  var el=document.getElementById('ooList');
  if(!orders.length){
    el.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px">No online orders yet.<br>Orders from the menu page appear here.</div>';
    return;
  }
  el.innerHTML=orders.slice().reverse().map(function(o){
    var total=o.items.reduce(function(s,i){return s+i.price*i.qty},0);
    return '<div class="oo-card">'+
      '<div class="oo-top"><span class="oo-id">#'+o.id+'</span><span class="oo-badge'+(o.accepted?' done':'')+'">'+( o.accepted?'✅ Accepted':'🆕 New')+'</span><span class="oo-time">'+o.time+'</span></div>'+
      '<div class="oo-name">'+o.name+'</div><div class="oo-ph">📞 '+o.phone+'</div>'+
      '<div class="oo-items">'+o.items.map(function(i){return i.emoji+' '+i.name+' ×'+i.qty}).join(' · ')+'</div>'+
      '<div class="oo-foot"><span class="oo-amt">₹'+total+'</span>'+
      (!o.accepted?'<button class="oo-accept" onclick="acceptOO(\''+o.id+'\')">✅ Accept & Load</button>':'<span style="font-size:12px;color:var(--muted)">Loaded to POS</span>')+
      '</div></div>';
  }).join('');
  // badge
  var pending=orders.filter(function(o){return !o.accepted}).length;
  var badge=document.getElementById('ooBadge');
  badge.style.display=pending>0?'inline':'none';
  badge.textContent=pending;
}

function acceptOO(id){
  var orders=getOnlineOrders();
  var o=orders.find(function(x){return x.id===id}); if(!o) return;
  o.accepted=true; saveOnlineOrders(orders);
  // load into cart
  o.items.forEach(function(i){
    var item=allItems.find(function(a){return a.id===i.id});
    if(!item) return;
    var ex=cart.find(function(c){return c.id===i.id});
    if(ex) ex.qty+=i.qty; else cart.push({id:item.id,name:item.name,price:item.price,emoji:item.emoji,qty:i.qty,category:item.category});
  });
  document.getElementById('custName').value=o.name;
  document.getElementById('custPhone').value=o.phone;
  renderCart(); renderGrid(allItems); renderOO();
  closeOO(); toast('✅ Order loaded to POS!');
}

// check online orders badge on load
renderOO();
setInterval(renderOO, 15000); // poll every 15s

// ── TOAST ─────────────────────────────────
function toast(msg,dur){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(function(){ t.classList.remove('show'); },dur||1800);
}

// init cart
renderCart();
</script>
</body>
</html>
